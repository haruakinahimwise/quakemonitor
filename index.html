<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QuakeMonitor</title>
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet CSS (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
  <!-- Admin Panel -->
  <div id="admin-panel">
    <h3>Admin Quake Spawner</h3>

    <label>Latitude:
      <input id="adm-lat" type="number" step="0.01" value="35.68">
    </label>

    <label>Longitude:
      <input id="adm-lon" type="number" step="0.01" value="139.76">
    </label>

    <label>Magnitude:
      <input id="adm-mag" type="number" step="0.1" value="5.0">
    </label>

    <label>Intensity (震度):
      <input id="adm-shindo" type="number" step="0.1" value="4.0">
    </label>

    <label>Region:
      <input id="adm-region" type="text" value="Tokyo">
    </label>

    <button id="adm-spawn">Spawn Quake</button>
    <button id="adm-remove">Remove Quakes</button>
  </div>

  <header>
    <h1>QuakeMonitor — 日本地震ライブ</h1>
    <div id="clock"></div>
    <div id="alert"></div>
    <div id="countdown"></div>
  </header>

  <main>
    <div id="map"></div>
  </main>

  <!-- Leaflet JS (CDN) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Modules -->
  <script src="modules/utils.js"></script>
  <script src="modules/map.js"></script>
  <script src="modules/waves.js"></script>
  <script src="modules/alarms.js"></script>
  <script src="modules/api.js"></script>
  <script src="modules/debug.js"></script>
  <script src="modules/admin.js"></script>

  <!-- Main app -->
  <script src="app.js"></script>
</body>
</html>
